#:schema https://raw.githubusercontent.com/lapce/lapce/master/extra/schemas/color-theme.json
[color-theme]
name = "Catppuccin Latte"

[ui]
font-family = ""
font-size = 13
header-height = 35
status-height = 25
tab-min-width = 100
activity-width = 50
scroll-width = 10
drop-shadow-width = 0

[color-theme.base]

black = "#bcc0cc"
blue = "#1e66f5"
cyan = "#179299"
green = "#40a02b"
magenta = "#ea76cb"
orange = "#fe640b"
purple = "#8839ef"
red = "#d20f39"
white = "#5c5f77"
yellow = "#df8e1d"

[color-theme.syntax]
"comment" = "#7c7f93"
"constant" = "#fe640b"
"type" = "$yellow"
"typeAlias" = "$yellow"
"number" = "$peach"
"enum" = "$yellow"
"struct" = "$yellow"
"structure" = "$yellow"
"interface" = "$yellow"
"attribute" = "$yellow"
"constructor" = "#209fb5"

"function" = "$blue"
"method" = "$blue"
"function.method" = "#8839ef"

"keyword" = "#8839ef"
"selfKeyword" = "$purple"

"field" = "$blue"
"property" = "$blue"
"enumMember" = "$teal"
"enum-member" = "$teal"

"string" = "$green"
"string.escape" = "$pink"

"type.builtin" = "$red"
"builtinType" = "$red"
"escape" = "#ea76cb"
"embedded" = "#179299"

"punctuation.delimiter" = "#7c7f93"
"text.title" = "$orange"
"text.uri" = "$blue"
"text.reference" = "$yellow"
"variable" = "$text"
"variable.other.member" = "$blue"
"tag" = "#1e66f5"


[color-theme.ui]
"lapce.error" = "$red"
"lapce.warn" = "$yellow"
"lapce.dropdown_shadow" = "#acb0be"
"lapce.border" = "#acb0be"
"lapce.scroll_bar" = "#ccd0da"

"lapce.button.primary.background" = "#8839ef"
"lapce.button.primary.foreground" = "#eff1f5"

# tab
"lapce.tab.active.background" = "#eff1f5"
"lapce.tab.active.foreground" = "#8839ef"
"lapce.tab.active.underline" = "#8839ef"

"lapce.tab.inactive.background" = "#eff1f5"
"lapce.tab.inactive.foreground" = "#6c6f85"
"lapce.tab.inactive.underline" = "#6c6f85"

"lapce.tab.separator" = "#dce0e8"

"lapce.icon.active" = "$white"
"lapce.icon.inactive" = "#7f8499"

"lapce.remote.icon" = "$purple"
"lapce.remote.local" = "#dce0e8"
"lapce.remote.connected" = "#50A14F"
"lapce.remote.connecting" = "#C18401"
"lapce.remote.disconnected" = "#E45649"

"lapce.plugin.name" = "#DDDDDD"
"lapce.plugin.description" = "$white"
"lapce.plugin.author" = "#B0B0B0"


"editor.background" = "#eff1f5"
"editor.foreground" = "#4c4f69"
"editor.dim" = "#8c8fa1"
"editor.focus" = "#CCCCCC"
"editor.caret" = "#179299"
"editor.selection" = "#acb0be"
"editor.current_line" = "#0b0c0f"
"editor.link" = "#dc8a78"
"editor.visible_whitespace" = "$grey"
"editor.indent_guide" = "$grey"
"editor.drag_drop_background" = "#209fb555"
"editor.drag_drop_tab_background" = "#0b0e1455"
"editor.sticky_header_background" = "$black"

"inlay_hint.foreground" = "#bcc0cc"
"inlay_hint.background" = "#e6e9ef"

"source_control.added" = "#40a02b32"
"source_control.removed" = "#e6455332"
"source_control.modified" = "#1e66f532"

"palette.background" = "#eff1f5"
"palette.current" = "#dce0e8"

"completion.background" = "#eff1f5"
"completion.current" = "#acb0be"

"hover.background" = "#eff1f5"

"activity.background" = "#e6e9ef"
"activity.current" = "#dce0e8"


"debug.breakpoint" = "$red"
"debug.breakpoint.hover" = "$grey"

"panel.background" = "#e6e9ef"
"panel.foreground" = "#4c4f69"
"panel.foreground.dim" = "#2c2e3e"
"panel.current.background" = "#dce0e8"
"panel.current.foreground" = "#4c4f69"
"panel.current.foreground.dim" = "#2c2e3e"
"panel.hovered.background" = "#dce0e8"
"panel.hovered.active.background" = "#16181e"
"panel.hovered.foreground" = "#4c4f69"
"panel.hovered.foreground.dim" = "#2c2e3e"

"status.background" = "#e6e9ef"
"status.foreground" = "$white"
"status.modal.normal.background" = "$blue"
"status.modal.normal.foreground" = "$black"
"status.modal.insert.background" = "$red"
"status.modal.insert.foreground" = "$black"
"status.modal.visual.background" = "$yellow"
"status.modal.visual.foreground" = "$black"
"status.modal.terminal.background" = "$purple"
"status.modal.terminal.foreground" = "$black"


"markdown.blockquote" = "#6c6f85"

"terminal.cursor" = "#dc8a78"
"terminal.foreground" = "#4c4f69"
"terminal.background" = "#eff1f5"
"terminal.white" = "#5c5f77"
"terminal.black" = "#bcc0cc"
"terminal.red" = "$red"
"terminal.blue" = "$blue"
"terminal.green" = "$green"
"terminal.yellow" = "$yellow"
"terminal.cyan" = "#179299"
"terminal.magenta" = "#ea76cb"
"terminal.bright_white" = "#6c6f85"
"terminal.bright_red" = "$red"
"terminal.bright_blue" = "$blue"
"terminal.bright_green" = "$green"
"terminal.bright_yellow" = "$yellow"
"terminal.bright_cyan" = "#179299"
"terminal.bright_magenta" = "#ea76cb"
"terminal.bright_black" = "#acb0be"
