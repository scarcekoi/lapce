#:schema https://raw.githubusercontent.com/lapce/lapce/master/extra/schemas/color-theme.json
[color-theme]
name = "Catppuccin Mocha"

[ui]
font-family = ""
font-size = 13
header-height = 35
status-height = 25
tab-min-width = 100
activity-width = 50
scroll-width = 10
drop-shadow-width = 0

[color-theme.base]

black = "#45475a"
blue = "#89b4fa"
cyan = "#94e2d5"
green = "#a6e3a1"
magenta = "#f5c2e7"
orange = "#fab387"
purple = "#cba6f7"
red = "#f38ba8"
white = "#bac2de"
yellow = "#f9e2af"

[color-theme.syntax]
"comment" = "#6c7086"
"constant" = "#fab387"
"type" = "$yellow"
"typeAlias" = "$yellow"
"number" = "$yellow"
"enum" = "$yellow"
"struct" = "$yellow"
"structure" = "$yellow"
"interface" = "$yellow"
"attribute" = "$yellow"
"constructor" = "#74c7ec"

"function" = "$blue"
"method" = "$blue"
"function.method" = "#cba6f7"

"keyword" = "#cba6f7"
"selfKeyword" = "$purple"

"field" = "$red"
"property" = "$red"
"enumMember" = "$red"
"enum-member" = "$red"

"string" = "$green"
"string.escape" = "$cyan"

"type.builtin" = "$red"
"builtinType" = "$red"
"escape" = "#94e2d5"
"embedded" = "#94e2d5"

"punctuation.delimiter" = "#9399b2"
"text.title" = "$orange"
"text.uri" = "$cyan"
"text.reference" = "$yellow"
"variable" = "$red"
"variable.other.member" = "$green"
"tag" = "#cba6f7"


[color-theme.ui]
"lapce.error" = "$red"
"lapce.warn" = "$yellow"
"lapce.dropdown_shadow" = "#585b70"
"lapce.border" = "#585b70"
"lapce.scroll_bar" = "#313244"

"lapce.button.primary.background" = "#cba6f7"
"lapce.button.primary.foreground" = "#1e1e2e"

# tab
"lapce.tab.active.background" = "#1e1e2e"
"lapce.tab.active.foreground" = "#cba6f7"
"lapce.tab.active.underline" = "#cba6f7"

"lapce.tab.inactive.background" = "#1e1e2e"
"lapce.tab.inactive.foreground" = "#a6adc8"
"lapce.tab.inactive.underline" = "#a6adc8"

"lapce.tab.separator" = "#11111b"

"lapce.icon.active" = "$white"
"lapce.icon.inactive" = "#555869"

"lapce.remote.icon" = "$purple"
"lapce.remote.local" = "#11111b"
"lapce.remote.connected" = "#50A14F"
"lapce.remote.connecting" = "#C18401"
"lapce.remote.disconnected" = "#E45649"

"lapce.plugin.name" = "#DDDDDD"
"lapce.plugin.description" = "$white"
"lapce.plugin.author" = "#B0B0B0"


"editor.background" = "#1e1e2e"
"editor.foreground" = "#cdd6f4"
"editor.dim" = "#7f849c"
"editor.focus" = "#CCCCCC"
"editor.caret" = "#94e2d5"
"editor.selection" = "#585b70"
"editor.current_line" = "#0b0b0f"
"editor.link" = "#f5e0dc"
"editor.visible_whitespace" = "$grey"
"editor.indent_guide" = "$grey"
"editor.drag_drop_background" = "#74c7ec55"
"editor.drag_drop_tab_background" = "#0b0e1455"
"editor.sticky_header_background" = "$black"

"inlay_hint.foreground" = "#45475a"
"inlay_hint.background" = "#181825"

"source_control.added" = "#a6e3a132"
"source_control.removed" = "#eba0ac32"
"source_control.modified" = "#89b4fa32"

"palette.background" = "#1e1e2e"
"palette.current" = "#11111b"

"completion.background" = "#1e1e2e"
"completion.current" = "#585b70"

"hover.background" = "#1e1e2e"

"activity.background" = "#181825"
"activity.current" = "#11111b"


"debug.breakpoint" = "$red"
"debug.breakpoint.hover" = "$grey"

"panel.background" = "#181825"
"panel.foreground" = "#cdd6f4"
"panel.foreground.dim" = "#90a4e6"
"panel.current.background" = "#11111b"
"panel.current.foreground" = "#cdd6f4"
"panel.current.foreground.dim" = "#90a4e6"
"panel.hovered.background" = "#11111b"
"panel.hovered.active.background" = "#16161e"
"panel.hovered.foreground" = "#cdd6f4"
"panel.hovered.foreground.dim" = "#90a4e6"

"status.background" = "#181825"
"status.foreground" = "$white"
"status.modal.normal.background" = "$blue"
"status.modal.normal.foreground" = "$black"
"status.modal.insert.background" = "$red"
"status.modal.insert.foreground" = "$black"
"status.modal.visual.background" = "$yellow"
"status.modal.visual.foreground" = "$black"
"status.modal.terminal.background" = "$purple"
"status.modal.terminal.foreground" = "$black"


"markdown.blockquote" = "#a6adc8"

"terminal.cursor" = "#f5e0dc"
"terminal.foreground" = "#cdd6f4"
"terminal.background" = "#1e1e2e"
"terminal.white" = "#bac2de"
"terminal.black" = "#45475a"
"terminal.red" = "$red"
"terminal.blue" = "$blue"
"terminal.green" = "$green"
"terminal.yellow" = "$yellow"
"terminal.cyan" = "#94e2d5"
"terminal.magenta" = "#f5c2e7"
"terminal.bright_white" = "#a6adc8"
"terminal.bright_red" = "$red"
"terminal.bright_blue" = "$blue"
"terminal.bright_green" = "$green"
"terminal.bright_yellow" = "$yellow"
"terminal.bright_cyan" = "#94e2d5"
"terminal.bright_magenta" = "#f5c2e7"
"terminal.bright_black" = "#585b70"
